services:
  cartgs_backend:
    build:
      context: ./cartgs_backend/.devcontainer
      dockerfile: Dockerfile
      args:
        USERNAME: zed
        USER_UID: 1000
        USER_GID: 1000
    container_name: cartgs_gsslam_backend
    hostname: cartgs-backend
    user: "1000:1000"

    # GPU and device access
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    devices:
      - /dev:/dev
      - "nvidia.com/gpu=all"

    privileged: true

    # Network configuration
    network_mode: host

    # Environment variables
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/user/1000/wayland-0:/tmp/wayland-1:rw
      - /etc/machine-id:/etc/machine-id:ro

    working_dir: /workspace

    # Runtime configuration
    restart: unless-stopped

    stdin_open: true
    tty: true

  unity_viewer:
    build:
      context: ./unity_viewer/.devcontainer
      dockerfile: Dockerfile
      args:
        USERNAME: zed
        USER_UID: 1000
        USER_GID: 1000
    container_name: unity_interactive_viewer
    hostname: unity-viewer
    user: "1000:1000"

    # GPU and device access
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    devices:
      - "nvidia.com/gpu=all"

    privileged: true

    # Network configuration
    network_mode: host

    # Environment variables
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/user/1000/wayland-0:/tmp/wayland-1:rw
      - /etc/machine-id:/etc/machine-id:ro

    working_dir: /workspace

    # Runtime configuration
    restart: unless-stopped

    # Depends on backend for ROS communication
    depends_on:
      - cartgs_backend

    command: >
      bash -c "
        echo 'Unity Viewer ready. Activating license if needed...' &&
        if [ -f /workspace/lisence_activation.sh ]; then
          chmod +x /workspace/lisence_activation.sh &&
          /workspace/lisence_activation.sh
        fi &&
        echo 'Unity Viewer ready. Starting shell...' &&
        /bin/bash
      "

    stdin_open: true
    tty: true
